<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>B2B Control Hub</title>
<style>
  :root{ --bg:#f2f4f8; --card:#fff; --ink:#1c2434; --muted:#66718a; --line:#dde3ee;
         --accent:#1f5fbf; --ok:#187a4b; --okbg:#e5f5ec; --bad:#b23232; --badbg:#fdeaea; --warn:#9a6b00; --warnbg:#fdf3d8; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink); font:14.5px/1.5 "Segoe UI",Roboto,Arial,sans-serif; }
  header{ background:#101a2c; color:#fff; padding:14px 22px; display:flex; align-items:center; gap:14px; }
  header h1{ font-size:17px; margin:0; font-weight:600; }
  header .sub{ color:#9fb0cc; font-size:12.5px; }
  header .live{ margin-left:auto; font-size:12px; color:#7ee2a8; }
  nav{ background:#fff; border-bottom:1px solid var(--line); padding:0 14px; display:flex; gap:2px; }
  nav button{ border:0; background:none; padding:12px 14px; font:inherit; color:var(--muted); cursor:pointer;
              border-bottom:2.5px solid transparent; }
  nav button.active{ color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }
  main{ max-width:1080px; margin:0 auto; padding:20px 16px 60px; }
  h2{ font-size:17px; margin:6px 0 2px; }
  .sub2{ color:var(--muted); font-size:13px; margin-bottom:14px; }
  .cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin:12px 0; }
  .kpi{ background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px 16px; }
  .kpi b{ font-size:26px; display:block; }
  .kpi span{ color:var(--muted); font-size:12.5px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px 18px; margin:12px 0; }
  table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  th{ text-align:left; color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.3px;
      border-bottom:1px solid var(--line); padding:8px 10px; }
  td{ border-bottom:1px solid #edf0f7; padding:9px 10px; }
  tr.click{ cursor:pointer; } tr.click:hover td{ background:#f6f9ff; }
  .badge{ display:inline-block; border-radius:20px; padding:2px 10px; font-size:12px; font-weight:600; }
  .b-ok{ background:var(--okbg); color:var(--ok); } .b-bad{ background:var(--badbg); color:#b23232; } .b-warn{ background:var(--warnbg); color:var(--warn); }
  button.act{ background:var(--accent); color:#fff; border:0; border-radius:8px; padding:9px 14px; font:inherit; font-weight:600; cursor:pointer; }
  button.ghost{ background:#fff; color:var(--accent); border:1px solid var(--accent); border-radius:8px; padding:8px 13px; font:inherit; cursor:pointer; }
  button.danger{ background:#fff; color:#b23232; border:1px solid #d89a9a; border-radius:8px; padding:8px 13px; font:inherit; cursor:pointer; }
  .toolbar{ display:flex; gap:10px; margin:10px 0; flex-wrap:wrap; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; } @media(max-width:820px){ .grid2{ grid-template-columns:1fr; } }
  .row{ display:flex; justify-content:space-between; gap:10px; padding:6px 0; border-bottom:1px dashed #e6eaf3; font-size:13.5px; }
  .row span{ color:var(--muted); }
  .check{ display:flex; gap:10px; padding:8px 10px; border-radius:8px; margin:6px 0; font-size:13.5px; }
  .check.ok{ background:var(--okbg); } .check.bad{ background:var(--badbg); } .check.warn{ background:var(--warnbg); }
  .check b{ min-width:170px; }
  .vers{ border-left:3px solid var(--line); margin:8px 0 8px 6px; padding-left:14px; }
  .vers .v{ margin:8px 0; cursor:pointer; } .vers .v.sel b{ color:var(--accent); }
  .vers .v small{ color:var(--muted); display:block; }
  /* modal */
  #overlay{ position:fixed; inset:0; background:rgba(12,18,32,.45); display:none; align-items:flex-start; justify-content:center; padding:40px 14px; overflow:auto; }
  #overlay.open{ display:flex; }
  #modal{ background:#fff; border-radius:12px; padding:20px 22px; width:min(560px,100%); }
  #modal h3{ margin:0 0 12px; font-size:16px; }
  .field{ margin:10px 0; } .field label{ display:block; font-size:12.5px; color:var(--muted); margin-bottom:4px; }
  .field input,.field select,.field textarea{ width:100%; border:1px solid var(--line); border-radius:8px; padding:9px 10px; font:inherit; }
  .hint{ font-size:12px; color:var(--muted); margin-top:3px; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:16px; }
  #toast{ position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#101a2c; color:#fff;
          padding:10px 18px; border-radius:10px; font-size:13.5px; opacity:0; transition:opacity .3s; pointer-events:none; }
  #toast.show{ opacity:1; }
  .muted{ color:var(--muted); }
</style>
</head>
<body>
<header>
  <h1>B2B Control Hub</h1>
  <span class="sub">rejestry · kontrola zgodności · decyzje z audytem</span>
  <span class="live" id="live">● baza: SQLite (lokalnie)</span>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div id="overlay"><div id="modal"></div></div>
<div id="toast"></div>

<script>
/* ============ stan UI (dane są na serwerze!) ============ */
const S = { tab:"pulpit", umowaId:null, fakturaId:null, wersjaIdx:null, analizaId:null };
const TABS = [["pulpit","Pulpit"],["kontraktorzy","Kontraktorzy"],["umowy","Umowy i aneksy"],["rozliczenia","Rozliczenia"],["analiza","Analiza prawna"],["historia","Historia"]];

/* ============ komunikacja z API ============ */
async function GET(u){ const r = await fetch(u); const j = await r.json(); if(!r.ok) throw j.error||"Błąd"; return j; }
async function POST(u,body){ const r = await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const j = await r.json(); if(!r.ok) throw j.error||"Błąd"; return j; }

const money = new Intl.NumberFormat("pl-PL",{style:"currency",currency:"PLN",maximumFractionDigits:0});
const esc = (s)=> String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function toast(t){ const el=document.getElementById("toast"); el.textContent=t; el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),2600); }
function badge(w){ return `<span class="badge b-${w.cls}">${esc(w.label)}</span>`; }

/* ============ widoki ============ */
async function viewPulpit(){
  const [p,fx] = await Promise.all([GET("/api/pulpit"), GET("/api/faktury")]);
  const kolejka = fx.filter(f=>!f.decyzja_status);
  return `
  <h2>Pulpit kontroli</h2><div class="sub2">Dane z prawdziwej bazy — każdy zapis zostaje na dysku (data/hub.db).</div>
  <div class="cards">
    <div class="kpi"><b>${p.kontraktorzy}</b><span>Kontraktorzy</span></div>
    <div class="kpi"><b>${p.umowy}</b><span>Umowy</span></div>
    <div class="kpi"><b>${p.w_kolejce}</b><span>Faktury w kolejce</span></div>
    <div class="kpi"><b>${p.niezgodnosci}</b><span>Niezgodności</span></div>
  </div>
  <div class="card"><h2 style="font-size:15px">Kolejka do decyzji</h2>
    ${kolejka.length? `<table><thead><tr><th>Faktura</th><th>Kontrahent</th><th>Kwota netto</th><th>Status kontroli</th></tr></thead><tbody>
      ${kolejka.map(f=>`<tr class="click" onclick="openFaktura(${f.id})"><td>${esc(f.numer)}</td><td>${esc(f.kontraktor_nazwa)}</td><td>${money.format(f.kwota_netto)}</td><td>${badge(f.kontrola.werdykt)}</td></tr>`).join("")}
    </tbody></table>` : `<div class="muted">Brak faktur w kolejce. Dodaj pierwszą w zakładce Rozliczenia.</div>`}
  </div>`;
}

async function viewKontraktorzy(){
  const ks = await GET("/api/kontraktorzy");
  return `
  <h2>Kontraktorzy</h2><div class="sub2">Karta kontrahenta to źródło prawdy (m.in. rachunek do kontroli faktur).</div>
  <div class="toolbar"><button class="act" onclick="formKontraktor()">+ Dodaj kontraktora</button></div>
  <div class="card">${ks.length? `<table><thead><tr><th>Nazwa</th><th>NIP</th><th>Rachunek</th><th>Dodano</th></tr></thead><tbody>
    ${ks.map(k=>`<tr><td>${esc(k.nazwa)}</td><td>${esc(k.nip)||"—"}</td><td>${esc(k.rachunek)||"—"}</td><td class="muted">${esc(k.utworzono)}</td></tr>`).join("")}
  </tbody></table>` : `<div class="muted">Pusto. Dodaj pierwszego kontraktora.</div>`}</div>`;
}

async function viewUmowy(){
  if(S.umowaId) return viewUmowa(S.umowaId);
  const us = await GET("/api/umowy");
  return `
  <h2>Umowy i aneksy</h2><div class="sub2">Każdy aneks buduje nowy tekst jednolity — zawsze jedna obowiązująca wersja.</div>
  <div class="toolbar"><button class="act" onclick="formUmowa()">+ Zarejestruj umowę</button>
    <button class="ghost" onclick="modalOdczyt('umowa')">📄 Wczytaj umowę z dokumentu (AI)</button></div>
  <div class="card">${us.length? `<table><thead><tr><th>Numer</th><th>Kontrahent</th><th>Model</th><th>Okres</th><th>Aneksy</th></tr></thead><tbody>
    ${us.map(u=>`<tr class="click" onclick="openUmowa(${u.id})"><td><b>${esc(u.numer)}</b></td><td>${esc(u.kontraktor_nazwa)}</td><td>${esc(u.model)}</td><td>${esc(u.obowiazuje_od)} → ${esc(u.obowiazuje_do)||"…"}</td><td>${u.liczba_aneksow}</td></tr>`).join("")}
  </tbody></table>` : `<div class="muted">Brak umów. Najpierw dodaj kontraktora, potem zarejestruj umowę.</div>`}</div>`;
}

async function viewUmowa(id){
  const u = await GET("/api/umowy/"+id);
  const idx = (S.wersjaIdx==null)? u.wersje.length-1 : S.wersjaIdx;
  const w = u.wersje[idx];
  return `
  <div class="toolbar"><button class="ghost" onclick="S.umowaId=null;S.wersjaIdx=null;render()">← Wróć do listy</button>
    <button class="act" onclick="formAneks(${u.id},'${esc(u.numer)}')">+ Dodaj aneks</button></div>
  <h2>${esc(u.numer)} — ${esc(u.kontraktor_nazwa)}</h2>
  <div class="sub2">${esc(u.zakres)||"—"} · model: ${esc(u.model)} · ${esc(u.obowiazuje_od)} → ${esc(u.obowiazuje_do)||"…"}</div>
  <div class="grid2">
    <div class="card">
      <h2 style="font-size:15px">${idx===u.wersje.length-1?"Aktualna wersja (tekst jednolity)":"Wersja archiwalna — "+esc(w.label)}</h2>
      <div class="row"><span>Stawka</span><b>${w.warunki.stawka} ${u.model==="godzinowy"?"zł/h":"zł/mc"}</b></div>
      <div class="row"><span>Limit godzin</span><b>${w.warunki.limit_godzin??"brak"}</b></div>
      <div class="row"><span>Rachunek</span><b>${esc(w.warunki.rachunek)||"—"}</b></div>
      <div class="row"><span>Osoba akceptująca</span><b>${esc(w.warunki.akceptujacy)||"—"}</b></div>
    </div>
    <div class="card">
      <h2 style="font-size:15px">Oś wersji (kliknij, aby podejrzeć)</h2>
      <div class="vers">
        ${u.wersje.map((v,i)=>`<div class="v ${i===idx?"sel":""}" onclick="S.wersjaIdx=${i};render()">
          <b>${esc(v.label)}</b><small>obowiązuje od ${esc(v.data)} — ${esc(v.opis)}</small></div>`).join("")}
      </div>
    </div>
  </div>`;
}

async function viewRozliczenia(){
  if(S.fakturaId) return viewFaktura(S.fakturaId);
  const fx = await GET("/api/faktury");
  return `
  <h2>Rozliczenia</h2><div class="sub2">Od wpływu faktury, przez kontrolę zgodności, po decyzję z audytem.</div>
  <div class="toolbar"><button class="act" onclick="formFaktura()">+ Zarejestruj fakturę</button>
    <button class="ghost" onclick="modalOdczyt('faktura')">📄 Wczytaj fakturę z dokumentu (AI)</button></div>
  <div class="card">${fx.length? `<table><thead><tr><th>Faktura</th><th>Kontrahent</th><th>Umowa</th><th>Kwota netto</th><th>Status</th></tr></thead><tbody>
    ${fx.map(f=>`<tr class="click" onclick="openFaktura(${f.id})"><td><b>${esc(f.numer)}</b></td><td>${esc(f.kontraktor_nazwa)}</td><td>${esc(f.umowa_numer)}</td><td>${money.format(f.kwota_netto)}</td><td>${badge(f.kontrola.werdykt)}</td></tr>`).join("")}
  </tbody></table>` : `<div class="muted">Brak faktur.</div>`}</div>`;
}

async function viewFaktura(id){
  const f = await GET("/api/faktury/"+id);
  const k = f.kontrola;
  return `
  <div class="toolbar"><button class="ghost" onclick="S.fakturaId=null;render()">← Wróć do listy</button></div>
  <h2>${esc(f.numer)} — ${esc(f.kontraktor_nazwa)} ${badge(f.decyzja_status? {cls:f.decyzja_status==="Zatwierdzona"?"ok":"bad", label:f.decyzja_status} : k.werdykt)}</h2>
  <div class="sub2">umowa ${esc(f.umowa_numer)} · okres ${esc(f.okres_od)} → ${esc(f.okres_do)} · źródło: ${esc(f.zrodlo)}</div>
  <div class="grid2">
    <div class="card"><h2 style="font-size:15px">Warunki umowy (po aneksach, na dzień faktury)</h2>
      <div class="row"><span>Stawka</span><b>${k.eff.stawka} ${f.model==="godzinowy"?"zł/h":"zł/mc"}</b></div>
      <div class="row"><span>Limit godzin</span><b>${k.eff.limit_godzin??"brak"}</b></div>
      <div class="row"><span>Rachunek</span><b>${esc(k.eff.rachunek)||"—"}</b></div>
      <div class="row"><span>Akceptujący</span><b>${esc(k.eff.akceptujacy)||"—"}</b></div>
    </div>
    <div class="card"><h2 style="font-size:15px">Dane z faktury</h2>
      <div class="row"><span>Godziny</span><b>${f.godziny}</b></div>
      <div class="row"><span>Stawka</span><b>${f.stawka}</b></div>
      <div class="row"><span>Kwota netto</span><b>${money.format(f.kwota_netto)}</b></div>
      <div class="row"><span>Rachunek</span><b>${esc(f.rachunek)||"—"}</b></div>
      <div class="row"><span>Akceptujący</span><b>${esc(f.akceptujacy)||"—"}</b></div>
    </div>
  </div>
  <div class="card"><h2 style="font-size:15px">Kontrola zgodności — ${k.checks.length} reguł</h2>
    ${k.checks.map(c=>`<div class="check ${c.status}"><b>${esc(c.t)}</b><span>${esc(c.det)}</span></div>`).join("")}
  </div>
  ${f.decyzja_status
    ? `<div class="card"><h2 style="font-size:15px">Decyzja (audyt)</h2>
        <div class="row"><span>Status</span><b>${esc(f.decyzja_status)}</b></div>
        <div class="row"><span>Kto</span><b>${esc(f.decyzja_kto)}</b></div>
        <div class="row"><span>Kiedy</span><b>${esc(f.decyzja_kiedy)}</b></div>
        <div class="row"><span>Komentarz</span><b>${esc(f.decyzja_komentarz)||"—"}</b></div></div>`
    : `<div class="toolbar">
        <button class="act" onclick="formDecyzja(${f.id},'Zatwierdzona')">✓ Zatwierdź i zleć płatność</button>
        <button class="danger" onclick="formDecyzja(${f.id},'Odrzucona')">✕ Odrzuć / zwróć do wyjaśnienia</button>
      </div>
      <div class="muted" style="font-size:12.5px">System nie wykonuje przelewu — decyzję podejmuje człowiek, a decyzja zostaje zapisana z datą i osobą.</div>`}
  `;
}

const OCENA = { niskie:{cls:"ok",label:"RYZYKO NISKIE"}, srednie:{cls:"warn",label:"RYZYKO ŚREDNIE"}, wysokie:{cls:"bad",label:"RYZYKO WYSOKIE"} };
const WSK = { etat:{cls:"bad",label:"wskazuje na ETAT"}, neutralne:{cls:"warn",label:"neutralne"}, b2b:{cls:"ok",label:"typowe dla B2B"} };

async function viewAnaliza(){
  if(S.analizaId) return viewAnalizaDetal(S.analizaId);
  const as = await GET("/api/analizy");
  return `
  <h2>Analiza prawna — znamiona umowy o pracę</h2>
  <div class="sub2">Ocena umowy B2B pod kątem art. 22 §1 Kodeksu pracy (ryzyko ZUS/PIP). Wsparcie decyzji — nie porada prawna; ostatnie słowo ma prawnik.</div>
  <div class="toolbar"><button class="act" onclick="modalAnaliza()">⚖️ Przeanalizuj umowę (AI)</button></div>
  <div class="card">${as.length? `<table><thead><tr><th>Data</th><th>Plik</th><th>Ocena ryzyka</th></tr></thead><tbody>
    ${as.map(a=>`<tr class="click" onclick="S.analizaId=${a.id};render()"><td class="muted">${esc(a.ts)}</td><td>${esc(a.plik)}</td><td>${badge(OCENA[a.ocena]||OCENA.srednie)}</td></tr>`).join("")}
  </tbody></table>` : `<div class="muted">Brak analiz. Wgraj umowę do oceny.</div>`}</div>`;
}

async function viewAnalizaDetal(id){
  const a = await GET("/api/analizy/"+id);
  const w = a.wynik;
  return `
  <div class="toolbar"><button class="ghost" onclick="S.analizaId=null;render()">← Wróć do listy</button></div>
  <h2>${esc(a.plik)} ${badge(OCENA[w.ocena]||OCENA.srednie)}</h2>
  <div class="sub2">analiza z ${esc(a.ts)}</div>
  <div class="card"><h2 style="font-size:15px">Podsumowanie</h2><p>${esc(w.podsumowanie)}</p></div>
  <div class="card"><h2 style="font-size:15px">Kryteria (art. 22 KP + orzecznictwo) — ${w.kryteria.length}</h2>
    ${w.kryteria.map(k=>`<div class="check ${WSK[k.wskazanie].cls}">
      <b>${esc(k.nazwa)}</b>
      <span><span class="badge b-${WSK[k.wskazanie].cls}">${WSK[k.wskazanie].label}</span>
        ${k.cytat?`<br><i>„${esc(k.cytat)}”</i>`:""}
        <br>${esc(k.komentarz)}</span></div>`).join("")}
  </div>
  <div class="muted" style="font-size:12.5px">To narzędzie wspiera analizę — nie zastępuje oceny prawnika ani nie stanowi porady prawnej.</div>`;
}

function modalAnaliza(){
  document.getElementById("modal").innerHTML = `
    <h3>⚖️ Analiza znamion umowy o pracę (AI)</h3>
    <div class="field"><label>Plik umowy: .pdf (także skan), .docx, .txt</label>
      <input id="fplik" type="file" accept=".pdf,.docx,.txt,.md" /></div>
    <div class="hint">AI oceni 10 kryteriów z cytatami z umowy. Wynik zapisuje się w bazie — można do niego wrócić.</div>
    <div class="modal-actions"><button class="ghost" onclick="closeForm()">Anuluj</button>
      <button class="act" id="mGo">⚖️ Analizuj</button></div>`;
  document.getElementById("overlay").classList.add("open");
  document.getElementById("mGo").onclick = async ()=>{
    const inp = document.getElementById("fplik");
    const file = inp.files && inp.files[0];
    if(!file) return toast("Wybierz plik.");
    const btn = document.getElementById("mGo");
    btn.disabled = true; btn.textContent = "⚖️ AI analizuje umowę… (to chwilę trwa)";
    try{
      const base64 = await new Promise((ok,err)=>{ const r=new FileReader();
        r.onload=()=>ok(String(r.result).split(",")[1]); r.onerror=err; r.readAsDataURL(file); });
      const a = await POST("/api/analiza-etat", { filename:file.name, base64 });
      closeForm(); S.tab="analiza"; S.analizaId=a.id; render();
      toast("Analiza zapisana w bazie.");
    }catch(e){ toast("⚠ "+e); btn.disabled=false; btn.textContent="⚖️ Analizuj"; }
  };
}

async function viewHistoria(){
  const h = await GET("/api/historia");
  return `
  <h2>Historia operacji</h2><div class="sub2">Pełny dziennik zdarzeń — zapisany w bazie, nie znika po odświeżeniu.</div>
  <div class="card">${h.length? `<table><tbody>
    ${h.map(x=>`<tr><td class="muted" style="white-space:nowrap">${esc(x.ts)}</td><td>${esc(x.tekst)}</td></tr>`).join("")}
  </tbody></table>` : `<div class="muted">Jeszcze pusto.</div>`}</div>`;
}

/* ============ formularze (modal) ============ */
function openForm(title, fields, onSubmit, notice){
  const html = fields.map(f=>{
    const id="fld_"+f.name;
    let inp;
    if(f.type==="select") inp = `<select id="${id}">${f.options.map(o=>`<option value="${o.v}" ${String(f.value)===String(o.v)?"selected":""}>${esc(o.t)}</option>`).join("")}</select>`;
    else inp = `<input id="${id}" type="${f.type||"text"}" value="${esc(f.value??"")}" placeholder="${esc(f.placeholder||"")}" />`;
    return `<div class="field"><label>${esc(f.label)}</label>${inp}${f.hint?`<div class="hint">${esc(f.hint)}</div>`:""}</div>`;
  }).join("");
  document.getElementById("modal").innerHTML = `<h3>${esc(title)}</h3>
    ${notice?`<div class="check ${notice.cls||"warn"}" style="margin-bottom:10px">${esc(notice.text)}</div>`:""}${html}
    <div class="modal-actions"><button class="ghost" onclick="closeForm()">Anuluj</button><button class="act" id="mSave">Zapisz</button></div>`;
  document.getElementById("overlay").classList.add("open");
  document.getElementById("mSave").onclick = async ()=>{
    const v={}; fields.forEach(f=> v[f.name]=document.getElementById("fld_"+f.name).value.trim());
    try{ await onSubmit(v); closeForm(); render(); }
    catch(e){ toast("⚠ "+e); }
  };
}
function closeForm(){ document.getElementById("overlay").classList.remove("open"); }
document.getElementById("overlay").addEventListener("click",(e)=>{ if(e.target.id==="overlay") closeForm(); });

function formKontraktor(p={}, poZapisie){
  openForm("Dodaj kontraktora",[
    {name:"nazwa",label:"Nazwa firmy *",value:p.nazwa},
    {name:"nip",label:"NIP",value:p.nip},
    {name:"rachunek",label:"Rachunek bankowy",value:p.rachunek,hint:"Będzie podstawą kontroli rachunku na fakturach."},
  ], async(v)=>{ const k=await POST("/api/kontraktorzy",v); toast("Zapisano kontraktora — jest w bazie.");
    if(poZapisie) setTimeout(()=>poZapisie(k),50); },
  p.nazwa? {cls:"warn",text:"Tego kontrahenta nie ma jeszcze w rejestrze — zapisz go, a potem otworzy się formularz umowy."} : undefined);
}

async function formUmowa(p={}, notice){
  const ks = await GET("/api/kontraktorzy");
  if(!ks.length) return toast("Najpierw dodaj kontraktora.");
  openForm("Zarejestruj umowę",[
    {name:"kontraktor_id",label:"Kontrahent *",type:"select",value:p.kontraktor_id,options:ks.map(k=>({v:k.id,t:k.nazwa}))},
    {name:"numer",label:"Numer umowy *",value:p.numer,placeholder:"B2B/…/2026/…"},
    {name:"model",label:"Model",type:"select",value:p.model,options:[{v:"godzinowy",t:"godzinowy"},{v:"ryczalt",t:"ryczałt"}]},
    {name:"obowiazuje_od",label:"Obowiązuje od *",type:"date",value:p.obowiazuje_od},
    {name:"obowiazuje_do",label:"Obowiązuje do",type:"date",value:p.obowiazuje_do},
    {name:"stawka",label:"Stawka (zł/h lub zł/mc)",type:"number",value:p.stawka},
    {name:"limit_godzin",label:"Limit godzin (puste = brak)",type:"number",value:p.limit_godzin||""},
    {name:"rachunek",label:"Rachunek bankowy",value:p.rachunek},
    {name:"akceptujacy",label:"Osoba akceptująca",value:p.akceptujacy},
    {name:"zakres",label:"Zakres usług",value:p.zakres},
  ], async(v)=>{ await POST("/api/umowy",v); toast("Umowa zapisana w bazie."); }, notice);
}

function formAneks(umowaId, numer){
  openForm("Dodaj aneks do "+numer,[
    {name:"data",label:"Data wejścia w życie *",type:"date"},
    {name:"opis",label:"Opis zmiany"},
    {name:"stawka",label:"Nowa stawka (puste = bez zmian)",type:"number"},
    {name:"limit_godzin",label:"Nowy limit godzin (puste = bez zmian)",type:"number"},
    {name:"akceptujacy",label:"Nowy akceptujący (puste = bez zmian)"},
    {name:"rachunek",label:"Nowy rachunek (puste = bez zmian)"},
  ], async(v)=>{ await POST(`/api/umowy/${umowaId}/aneksy`,v); S.wersjaIdx=null; toast("Aneks zapisany — powstał nowy tekst jednolity."); });
}

async function formFaktura(p={}, notice){
  const us = await GET("/api/umowy");
  if(!us.length) return toast("Najpierw zarejestruj umowę.");
  openForm("Zarejestruj fakturę",[
    {name:"umowa_id",label:"Umowa *",type:"select",value:p.umowa_id,options:us.map(u=>({v:u.id,t:u.numer+" — "+u.kontraktor_nazwa}))},
    {name:"numer",label:"Numer faktury *",value:p.numer,placeholder:"FV/…/2026"},
    {name:"okres_od",label:"Okres od",type:"date",value:p.okres_od},
    {name:"okres_do",label:"Okres do",type:"date",value:p.okres_do},
    {name:"data_wystawienia",label:"Data wystawienia",type:"date",value:p.data_wystawienia},
    {name:"godziny",label:"Godziny (0 dla ryczałtu)",type:"number",value:p.godziny},
    {name:"stawka",label:"Stawka",type:"number",value:p.stawka},
    {name:"kwota_netto",label:"Kwota netto",type:"number",value:p.kwota_netto},
    {name:"rachunek",label:"Rachunek z faktury",value:p.rachunek},
    {name:"akceptujacy",label:"Osoba akceptująca",value:p.akceptujacy},
    {name:"zrodlo",label:"Źródło",type:"select",value:p.zrodlo,options:[{v:"KSeF",t:"KSeF"},{v:"E-mail",t:"E-mail"},{v:"PDF",t:"PDF"},{v:"ręcznie",t:"ręcznie"}]},
  ], async(v)=>{ const f=await POST("/api/faktury",v); S.tab="rozliczenia"; S.fakturaId=f.id;
    toast("Faktura zapisana. Wynik kontroli: "+f.kontrola.werdykt.label); }, notice);
}

/* ============ odczyt dokumentu przez AI (Etap 2) ============ */
function modalOdczyt(rodzaj){ // "umowa" | "faktura"
  document.getElementById("modal").innerHTML = `
    <h3>${rodzaj==="umowa"?"Wczytaj umowę z dokumentu":"Wczytaj fakturę z dokumentu"} (odczyt AI)</h3>
    <div class="field"><label>Plik: .pdf (także skan), .docx, .txt</label>
      <input id="fplik" type="file" accept=".pdf,.docx,.txt,.md" /></div>
    <div class="hint">AI odczyta pola do formularza. Niczego nie zapisuje samo — Ty sprawdzasz i klikasz Zapisz.
      Czego nie odczytano, uzupełniasz ręcznie.</div>
    <div class="modal-actions"><button class="ghost" onclick="closeForm()">Anuluj</button>
      <button class="act" id="mGo">🤖 Odczytaj dokument</button></div>`;
  document.getElementById("overlay").classList.add("open");
  document.getElementById("mGo").onclick = async ()=>{
    const inp = document.getElementById("fplik");
    const file = inp.files && inp.files[0];
    if(!file) return toast("Wybierz plik.");
    const btn = document.getElementById("mGo");
    btn.disabled = true; btn.textContent = "🤖 AI czyta dokument…";
    try{
      const base64 = await new Promise((ok,err)=>{ const r=new FileReader();
        r.onload=()=>ok(String(r.result).split(",")[1]); r.onerror=err; r.readAsDataURL(file); });
      const r = await POST("/api/odczyt/"+rodzaj, { filename:file.name, base64 });
      closeForm();
      if(rodzaj==="umowa"){
        if(r.istniejaca_umowa_id){
          toast("Ta umowa ("+r.value.numer+") już jest w rejestrze — otwieram ją. Zmiany warunków wprowadza się aneksem.");
          openUmowa(r.istniejaca_umowa_id);
          return;
        }
        const braki = r.braki.length? "Nie odczytano: "+r.braki.join(", ")+" — uzupełnij ręcznie." : "Odczytano wszystkie kluczowe pola — sprawdź i zapisz.";
        const dane = { ...r.value, limit_godzin: r.value.limit_godzin||"", kontraktor_id: r.kontraktor_id };
        if(!r.kontraktor_id){
          formKontraktor({ nazwa:r.value.kontrahent, nip:r.value.nip, rachunek:r.value.rachunek },
            (k)=> formUmowa({ ...dane, kontraktor_id:k.id }, {cls:r.braki.length?"warn":"ok", text:braki}));
        } else {
          formUmowa(dane, {cls:r.braki.length?"warn":"ok", text:braki});
        }
      } else {
        const notice = r.umowa_id
          ? {cls:"ok", text:"Rozpoznano umowę "+(r.value.id_umowy||"")+" — sprawdź pola i zapisz."}
          : {cls:"warn", text:"Nie rozpoznano numeru umowy na fakturze — wybierz umowę ręcznie."};
        formFaktura({ ...r.value, umowa_id:r.umowa_id, zrodlo:r.value.zrodlo||"PDF" }, notice);
      }
    }catch(e){ toast("⚠ "+e); btn.disabled=false; btn.textContent="🤖 Odczytaj dokument"; }
  };
}

function formDecyzja(id, status){
  openForm(status==="Zatwierdzona"?"Zatwierdź fakturę":"Odrzuć fakturę",[
    {name:"kto",label:"Kto podejmuje decyzję *",placeholder:"imię i nazwisko"},
    {name:"komentarz",label:"Komentarz"},
  ], async(v)=>{ await POST(`/api/faktury/${id}/decyzja`,{...v,status}); toast("Decyzja zapisana z audytem (kto + kiedy)."); });
}

/* ============ nawigacja / render ============ */
function openUmowa(id){ S.umowaId=id; S.wersjaIdx=null; S.tab="umowy"; render(); }
function openFaktura(id){ S.fakturaId=id; S.tab="rozliczenia"; render(); }

async function render(){
  document.getElementById("nav").innerHTML = TABS.map(([id,l])=>
    `<button class="${S.tab===id?"active":""}" onclick="S.tab='${id}';S.umowaId=null;S.fakturaId=null;S.analizaId=null;render()">${l}</button>`).join("");
  const views = { pulpit:viewPulpit, kontraktorzy:viewKontraktorzy, umowy:viewUmowy, rozliczenia:viewRozliczenia, analiza:viewAnaliza, historia:viewHistoria };
  try{ document.getElementById("main").innerHTML = await views[S.tab](); }
  catch(e){ document.getElementById("main").innerHTML = `<div class="card">⚠ ${esc(String(e))} — czy serwer działa?</div>`; }
}
render();
GET("/api/ai").then(a=>{
  document.getElementById("live").textContent = "● baza: SQLite · AI: "+a.opis;
  if(a.organizacja) document.querySelector("header .sub").textContent = a.organizacja+" · rejestry · kontrola · analiza prawna";
}).catch(()=>{});
</script>
